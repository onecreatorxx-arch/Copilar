name: Debug Android Build Structure

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current directory
        run: pwd

      - name: List root files
        run: ls -la

      - name: Recursive full tree
        run: |
          sudo apt update
          sudo apt install -y tree
          tree -a -I ".git"

      - name: Find gradlew location
        run: find . -name "gradlew"

      - name: Show directory depth 3
        run: find . -maxdepth 3 -type d

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Try chmod (will fail if not root)
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            echo "gradlew found in root"
          else
            echo "gradlew NOT in root"
          fi

      - name: Attempt build (debug test)
        run: |
          if [ -f gradlew ]; then
            ./gradlew tasks
          else
            echo "Skipping build because gradlew not found in root"
          fi
