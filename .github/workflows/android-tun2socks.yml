name: Build Android tun2socks

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake unzip git

    - name: Download Android NDK r26d
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip android-ndk-r26d-linux.zip
        echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

    - name: Clone badvpn
      run: |
        git clone https://github.com/ambrop72/badvpn.git

    - name: Configure CMake for Android
      run: |
        cd badvpn
        mkdir build-android
        cd build-android

        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DBUILD_TUN2SOCKS=ON \
          -DBUILD_UDPGW=OFF \
          -DBUILD_SERVER=OFF \
          -DBUILD_CLIENT=OFF \
          -DBUILD_NOTHING_BY_DEFAULT=ON \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build tun2socks
      run: |
        cd badvpn/build-android
        make -j$(nproc)

    - name: Create shared library manually
      run: |
        cd badvpn/build-android

        $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
          -shared -fPIC \
          tun2socks/CMakeFiles/tun2socks.dir/*.o \
          -o libtun2socks.so

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libtun2socks-arm64
        path: badvpn/build-android/libtun2socks.so
